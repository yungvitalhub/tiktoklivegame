
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cinzel+Decorative:wght@700&family=Dancing+Script:wght@700&family=Righteous&family=Press+Start+2P&family=Lobster&family=Orbitron:wght@800&family=Permanent+Marker&family=Great+Vibes&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.app{display:flex;flex-direction:column;gap:10px;padding:10px 0;}
.main-row{display:flex;gap:10px;align-items:flex-start;}

.screen{position:relative;flex:1;height:440px;border-radius:16px;overflow:hidden;border:0.5px solid rgba(255,255,255,0.15);}
.screen-bg{position:absolute;inset:0;z-index:0;}
.screen-bg.theme-galaxy{background:#08080f;}
.screen-bg.theme-sunset{background:#1a0510;}
.screen-bg.theme-ocean{background:#020d1a;}
.screen-bg.theme-forest{background:#030f05;}
.screen-bg.theme-luxury{background:#0d0900;}

.stars{position:absolute;inset:0;z-index:1;pointer-events:none;}
.star{position:absolute;border-radius:50%;animation:twinkle linear infinite;}
@keyframes twinkle{0%,100%{opacity:0.2;}50%{opacity:1;}}

.live-badge{position:absolute;top:10px;left:10px;background:#ff3b5c;color:white;font-size:11px;font-weight:700;padding:3px 8px;border-radius:4px;font-family:var(--font-sans);z-index:30;letter-spacing:1px;}
.viewer-count{position:absolute;top:10px;left:54px;background:rgba(0,0,0,0.55);color:rgba(255,255,255,0.75);font-size:11px;padding:3px 8px;border-radius:4px;font-family:var(--font-sans);z-index:30;}

.names-zone{position:absolute;inset:0;pointer-events:none;z-index:10;}
.emoji-layer{position:absolute;inset:0;pointer-events:none;z-index:15;}
.gift-anim-layer{position:absolute;inset:0;pointer-events:none;z-index:14;}
.welcome-layer{position:absolute;inset:0;pointer-events:none;z-index:25;display:flex;align-items:flex-start;justify-content:center;padding-top:50px;}

.welcome-banner{
  padding:10px 22px;border-radius:30px;font-family:var(--font-sans);font-size:14px;font-weight:700;
  color:white;text-align:center;white-space:nowrap;
  opacity:0;transform:scale(0.7) translateY(-10px);
  transition:opacity 0.35s,transform 0.35s;
  pointer-events:none;
}
.welcome-banner.show{opacity:1;transform:scale(1) translateY(0);}

.floating-name{position:absolute;white-space:nowrap;pointer-events:none;transition:opacity 0.4s;}
.emoji-burst{position:absolute;pointer-events:none;font-size:22px;animation:emojiFly linear forwards;}
@keyframes emojiFly{
  0%{transform:translateY(0) scale(0.5) rotate(0deg);opacity:1;}
  100%{transform:translateY(-110px) scale(1.3) rotate(var(--r));opacity:0;}
}

.gift-icon{position:absolute;pointer-events:none;font-size:40px;animation:giftAnim ease-out forwards;}
@keyframes giftAnim{
  0%{transform:scale(0) rotate(-20deg);opacity:0;}
  15%{transform:scale(1.3) rotate(5deg);opacity:1;}
  30%{transform:scale(1) rotate(0deg);opacity:1;}
  70%{transform:scale(1) translateY(-20px);opacity:1;}
  100%{transform:scale(0.6) translateY(-60px);opacity:0;}
}

.leaderboard{width:165px;background:#0d0d1a;border-radius:14px;border:0.5px solid rgba(255,255,255,0.1);overflow:hidden;flex-shrink:0;}
.lb-header{padding:9px 12px 7px;border-bottom:0.5px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:6px;}
.lb-title{font-size:12px;font-weight:700;color:#fff;font-family:var(--font-sans);letter-spacing:0.5px;}
.lb-list{padding:4px 0;min-height:60px;}
.lb-row{display:flex;align-items:center;gap:6px;padding:5px 10px;}
.lb-rank{font-size:13px;width:18px;text-align:center;flex-shrink:0;}
.lb-name{font-size:11px;color:rgba(255,255,255,0.85);font-family:var(--font-sans);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lb-count{font-size:11px;color:rgba(255,255,255,0.38);font-family:var(--font-sans);flex-shrink:0;}
.lb-empty{font-size:11px;color:rgba(255,255,255,0.22);font-family:var(--font-sans);text-align:center;padding:16px 10px;}

.controls{display:flex;flex-direction:column;gap:8px;}
.ctrl-label{font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-sans);}
.font-picker{display:flex;gap:5px;flex-wrap:wrap;}
.font-chip{padding:5px 10px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:11px;cursor:pointer;transition:all 0.15s;font-family:var(--font-sans);}
.font-chip.active{background:#7f77dd;border-color:#7f77dd;color:white;}
.font-chip:hover:not(.active){background:var(--color-background-primary);color:var(--color-text-primary);}

.theme-row{display:flex;gap:6px;flex-wrap:wrap;}
.theme-btn{padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:11px;cursor:pointer;transition:all 0.15s;font-family:var(--font-sans);}
.theme-btn.active{background:#ff3b5c;border-color:#ff3b5c;color:white;}

.gift-row{display:flex;gap:6px;flex-wrap:wrap;}
.gift-btn-type{padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);color:var(--color-text-secondary);font-size:12px;cursor:pointer;transition:all 0.15s;font-family:var(--font-sans);}
.gift-btn-type.active{background:#f59e0b;border-color:#f59e0b;color:white;}

.input-row{display:flex;gap:8px;}
.name-input{flex:1;height:40px;border-radius:10px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:15px;padding:0 14px;font-family:var(--font-sans);outline:none;}
.name-input:focus{border-color:#7f77dd;box-shadow:0 0 0 2px rgba(127,119,221,0.2);}
.fire-btn{height:40px;padding:0 18px;background:#ff3b5c;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font-sans);transition:opacity 0.15s,transform 0.1s;}
.fire-btn:hover{opacity:0.88;}
.fire-btn:active{transform:scale(0.96);}
.btn-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;}
.sec-btn{height:34px;padding:0 13px;background:rgba(127,119,221,0.13);color:#9d97e8;border:0.5px solid rgba(127,119,221,0.35);border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:all 0.15s;white-space:nowrap;}
.sec-btn:hover{background:rgba(127,119,221,0.22);}
.clr-btn{height:34px;padding:0 13px;background:transparent;color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:8px;font-size:12px;cursor:pointer;font-family:var(--font-sans);transition:all 0.15s;}
.clr-btn:hover{background:var(--color-background-secondary);}
</style>

<div class="app">
  <div class="main-row">
    <div class="screen" id="screen">
      <div class="screen-bg theme-galaxy" id="screenBg"></div>
      <div class="stars" id="stars"></div>
      <div class="live-badge">LIVE</div>
      <div class="viewer-count" id="viewerCount">👁 1.2K</div>
      <div class="names-zone" id="namesZone"></div>
      <div class="emoji-layer" id="emojiLayer"></div>
      <div class="gift-anim-layer" id="giftAnimLayer"></div>
      <div class="welcome-layer" id="welcomeLayer">
        <div class="welcome-banner" id="welcomeBanner"></div>
      </div>
    </div>

    <div class="leaderboard">
      <div class="lb-header">
        <span style="font-size:16px;">🏆</span>
        <span class="lb-title">TOP GIFTERS</span>
      </div>
      <div class="lb-list" id="lbList">
        <div class="lb-empty">Gift to appear!</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-label">background theme</div>
    <div class="theme-row" id="themeRow"></div>

    <div class="ctrl-label">gift animation</div>
    <div class="gift-row" id="giftRow"></div>

    <div class="ctrl-label">font style</div>
    <div class="font-picker" id="fontPicker"></div>

    <div class="input-row">
      <input class="name-input" id="nameInput" type="text" placeholder="Type gifter's name...">
      <button class="fire-btn" id="fireBtn">🎁 Gift!</button>
    </div>
    <div class="btn-row">
      <button class="sec-btn" id="autoBtn">▶ Auto demo</button>
      <button class="clr-btn" id="clearBtn">Clear screen</button>
      <button class="clr-btn" id="resetBtn">Reset board</button>
    </div>
  </div>
</div>

<script>
const FONTS=[
  {name:"Fancy",family:"Great Vibes",size:42,colors:["#ff9ef5","#e879f9","#f0abfc"]},
  {name:"Retro",family:"Pacifico",size:27,colors:["#fbbf24","#fb923c","#fde68a"]},
  {name:"Royal",family:"Cinzel Decorative",size:18,colors:["#a78bfa","#c4b5fd","#7c3aed"]},
  {name:"Neon",family:"Orbitron",size:17,colors:["#34d399","#6ee7b7","#10b981"]},
  {name:"Marker",family:"Permanent Marker",size:28,colors:["#fb7185","#fda4af","#f43f5e"]},
  {name:"Pixel",family:"Press Start 2P",size:12,colors:["#38bdf8","#7dd3fc","#0ea5e9"]},
  {name:"Script",family:"Dancing Script",size:36,colors:["#f472b6","#f9a8d4","#ec4899"]},
  {name:"Bold",family:"Bebas Neue",size:38,colors:["#fd8a7c","#feb2a8","#ef4444"]},
  {name:"Lobster",family:"Lobster",size:30,colors:["#67e8f9","#a5f3fc","#06b6d4"]},
];

const THEMES=[
  {name:"🌌 Galaxy",key:"galaxy",stars:true,gradient:"radial-gradient(ellipse at 40% 80%,#1a0a2e 0%,#08080f 70%)",welcome:"#7f77dd"},
  {name:"🌅 Sunset",key:"sunset",stars:false,gradient:"linear-gradient(180deg,#1a0510 0%,#4a0a1a 50%,#8b2252 100%)",welcome:"#f472b6"},
  {name:"🌊 Ocean",key:"ocean",stars:false,gradient:"linear-gradient(180deg,#020d1a 0%,#0a2a4a 60%,#0e3a5c 100%)",welcome:"#38bdf8"},
  {name:"🌲 Forest",key:"forest",stars:false,gradient:"linear-gradient(180deg,#030f05 0%,#0a2a0e 60%,#0f3a14 100%)",welcome:"#34d399"},
  {name:"👑 Luxury",key:"luxury",stars:false,gradient:"linear-gradient(180deg,#0d0900 0%,#2a1a00 60%,#3a2500 100%)",welcome:"#fbbf24"},
];

const GIFTS=[
  {name:"🌹 Rose",icon:"🌹",emojis:["🌹","🌸","💐","✨","💕"]},
  {name:"🦁 Lion",icon:"🦁",emojis:["🦁","👑","🔥","✨","💪"]},
  {name:"💎 Diamond",icon:"💎",emojis:["💎","✨","🌟","💫","🪙"]},
  {name:"🚀 Rocket",icon:"🚀",emojis:["🚀","⭐","💥","🌟","🛸"]},
  {name:"🎆 Firework",icon:"🎆",emojis:["🎆","🎇","✨","🌟","🎊"]},
  {name:"🦋 Butterfly",icon:"🦋",emojis:["🦋","🌸","💜","✨","🌺"]},
  {name:"🐉 Dragon",icon:"🐉",emojis:["🐉","🔥","💫","⚡","👑"]},
  {name:"🎸 Random",icon:"🎲",emojis:["🎁","💎","👑","🌹","✨","🔥","💜","🦋","🌟","💰"]},
];

const DEMO_NAMES=["XxGifterKingxX","StarQueen","DragonSlayer99","LuckyRose","PandaBear","TikTokLegend","GiftGoddess","NightWolf","CrystalFox","VIPDiamond","SunsetVibes","RoseGold","CosmicDrip","GlitterBomb","IcyQueen"];

let selectedFont=0;
let selectedTheme=0;
let selectedGift=0;
let autoInterval=null;
let autoRunning=false;
let autoIdx=0;
let leaderboard={};
let seenGifters=new Set();
let nameElements={};
let viewerBase=1200;
let welcomeTimeout=null;

const screen=document.getElementById('screen');
const screenBg=document.getElementById('screenBg');
const starsEl=document.getElementById('stars');
const namesZone=document.getElementById('namesZone');
const emojiLayer=document.getElementById('emojiLayer');
const giftAnimLayer=document.getElementById('giftAnimLayer');
const welcomeBanner=document.getElementById('welcomeBanner');
const nameInput=document.getElementById('nameInput');
const fireBtn=document.getElementById('fireBtn');
const fontPicker=document.getElementById('fontPicker');
const themeRow=document.getElementById('themeRow');
const giftRow=document.getElementById('giftRow');
const autoBtn=document.getElementById('autoBtn');
const clearBtn=document.getElementById('clearBtn');
const resetBtn=document.getElementById('resetBtn');
const lbList=document.getElementById('lbList');
const viewerCountEl=document.getElementById('viewerCount');

function buildStars(){
  starsEl.innerHTML='';
  for(let i=0;i<80;i++){
    const s=document.createElement('div');
    s.className='star';
    const size=Math.random()*2.5+0.5;
    s.style.cssText=`width:${size}px;height:${size}px;background:white;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;opacity:${Math.random()*0.6+0.1};`;
    starsEl.appendChild(s);
  }
}

function applyTheme(idx){
  selectedTheme=idx;
  const t=THEMES[idx];
  screenBg.style.background=t.gradient;
  starsEl.style.display=t.stars?'block':'none';
  document.querySelectorAll('.theme-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
}

function buildThemeRow(){
  THEMES.forEach((t,i)=>{
    const btn=document.createElement('button');
    btn.className='theme-btn'+(i===0?' active':'');
    btn.textContent=t.name;
    btn.onclick=()=>applyTheme(i);
    themeRow.appendChild(btn);
  });
}

function buildGiftRow(){
  GIFTS.forEach((g,i)=>{
    const btn=document.createElement('button');
    btn.className='gift-btn-type'+(i===0?' active':'');
    btn.textContent=g.name;
    btn.onclick=()=>{
      selectedGift=i;
      document.querySelectorAll('.gift-btn-type').forEach((b,j)=>b.classList.toggle('active',j===i));
    };
    giftRow.appendChild(btn);
  });
}

function buildFontPicker(){
  FONTS.forEach((f,i)=>{
    const chip=document.createElement('button');
    chip.className='font-chip'+(i===0?' active':'');
    chip.textContent=f.name;
    chip.onclick=()=>{
      document.querySelectorAll('.font-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');
      selectedFont=i;
    };
    fontPicker.appendChild(chip);
  });
}

function showWelcome(name){
  const t=THEMES[selectedTheme];
  welcomeBanner.textContent='🎉 Welcome '+name+'! Thanks for the gift!';
  welcomeBanner.style.background=t.welcome+'cc';
  welcomeBanner.style.boxShadow='0 0 24px '+t.welcome+'88';
  welcomeBanner.classList.add('show');
  if(welcomeTimeout)clearTimeout(welcomeTimeout);
  welcomeTimeout=setTimeout(()=>welcomeBanner.classList.remove('show'),2800);
}

function spawnGiftAnim(x,y){
  const g=GIFTS[selectedGift];
  const icons=g.icon==='🎲'?['🎁','💎','👑','🌹','🔥']:Array(3).fill(g.icon);
  icons.forEach((_,i)=>{
    setTimeout(()=>{
      const el=document.createElement('div');
      el.className='gift-icon';
      const ox=(Math.random()-0.5)*60;
      el.style.cssText=`left:${x+ox-20}px;top:${y-20}px;animation-duration:${1.6+Math.random()*0.5}s;`;
      el.textContent=g.icon==='🎲'?GIFTS[7].emojis[Math.floor(Math.random()*GIFTS[7].emojis.length)]:g.icon;
      giftAnimLayer.appendChild(el);
      setTimeout(()=>el.remove(),2200);
    },i*200);
  });
}

function spawnEmojis(x,y){
  const g=GIFTS[selectedGift];
  const pool=g.icon==='🎲'?g.emojis:g.emojis;
  for(let i=0;i<10;i++){
    const em=document.createElement('div');
    em.className='emoji-burst';
    const emoji=pool[Math.floor(Math.random()*pool.length)];
    em.textContent=emoji;
    const ox=(Math.random()-0.5)*90;
    const rot=(Math.random()-0.5)*140;
    const dur=0.7+Math.random()*0.7;
    em.style.cssText=`left:${x+ox}px;top:${y}px;--r:${rot}deg;animation-duration:${dur}s;animation-delay:${Math.random()*0.25}s;`;
    emojiLayer.appendChild(em);
    setTimeout(()=>em.remove(),(dur+0.4)*1000);
  }
}

function spawnName(name,fontIdx){
  const fi=fontIdx!==undefined?fontIdx:selectedFont;
  const f=FONTS[fi];
  const color=f.colors[Math.floor(Math.random()*f.colors.length)];
  const sw=namesZone.clientWidth||320;
  const sh=namesZone.clientHeight||440;
  const approxW=name.length*f.size*0.55+30;
  const x=Math.max(8,Math.floor(Math.random()*(sw-approxW-16))+8);
  const y=Math.max(8,Math.floor(Math.random()*(sh*0.55))+8);

  if(nameElements[name])nameElements[name].remove();

  const el=document.createElement('div');
  el.className='floating-name';
  el.style.cssText=`left:${x}px;top:${y}px;font-family:'${f.family}',cursive,sans-serif;font-size:${f.size}px;color:${color};text-shadow:0 0 18px ${color}99,0 0 36px ${color}44;opacity:0;`;
  el.textContent=name;
  namesZone.appendChild(el);
  nameElements[name]=el;
  requestAnimationFrame(()=>el.style.opacity='1');

  spawnEmojis(x+approxW/2,y+f.size);
  spawnGiftAnim(x+approxW/2,y+f.size/2);

  const isNew=!seenGifters.has(name);
  if(isNew){seenGifters.add(name);showWelcome(name);}

  leaderboard[name]=(leaderboard[name]||0)+1;
  updateLeaderboard();
}

function updateLeaderboard(){
  const sorted=Object.entries(leaderboard).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const medals=['🥇','🥈','🥉'];
  lbList.innerHTML='';
  if(!sorted.length){lbList.innerHTML='<div class="lb-empty">Gift to appear!</div>';return;}
  sorted.forEach(([name,count],i)=>{
    const row=document.createElement('div');
    row.className='lb-row';
    const rankStr=i<3?medals[i]:`<span style="font-size:10px;color:rgba(255,255,255,0.3)">${i+1}</span>`;
    row.innerHTML=`<span class="lb-rank">${rankStr}</span><span class="lb-name">${name}</span><span class="lb-count">${count}x</span>`;
    lbList.appendChild(row);
  });
}

setInterval(()=>{
  viewerBase+=Math.floor(Math.random()*50)-20;
  viewerBase=Math.max(600,viewerBase);
  viewerCountEl.textContent='👁 '+(viewerBase>999?(viewerBase/1000).toFixed(1)+'K':viewerBase);
},3000);

fireBtn.onclick=()=>{
  const name=nameInput.value.trim();
  if(!name)return;
  spawnName(name);
  nameInput.value='';
  nameInput.focus();
};
nameInput.addEventListener('keydown',e=>{if(e.key==='Enter')fireBtn.click();});

autoBtn.onclick=()=>{
  if(autoRunning){
    clearInterval(autoInterval);autoRunning=false;autoBtn.textContent='▶ Auto demo';
  }else{
    autoRunning=true;autoBtn.textContent='⏹ Stop demo';
    const fire=()=>{
      spawnName(DEMO_NAMES[autoIdx%DEMO_NAMES.length],autoIdx%FONTS.length);
      autoIdx++;
    };
    fire();autoInterval=setInterval(fire,1600);
  }
};

clearBtn.onclick=()=>{
  document.querySelectorAll('.floating-name').forEach(el=>el.remove());
  nameElements={};
  if(autoRunning){clearInterval(autoInterval);autoRunning=false;autoBtn.textContent='▶ Auto demo';}
};

resetBtn.onclick=()=>{leaderboard={};seenGifters=new Set();updateLeaderboard();};

buildStars();
buildThemeRow();
buildGiftRow();
buildFontPicker();
applyTheme(0);
</script>
